<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Train</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #232323;
    --border2: #2e2e2e;
    --text: #f0f0f0;
    --muted: #666;
    --muted2: #444;
    --accent: #f0f0f0;
    --dim: #999;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo { display: flex; align-items: baseline; gap: 8px; }
  .logo-main { font-size: 18px; font-weight: 800; letter-spacing: -0.03em; color: var(--text); }
  .logo-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .api-status {
    display: flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted);
    cursor: default; padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 6px; background: transparent;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted2); }
  .status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }

  main { max-width: 960px; margin: 0 auto; padding: 48px 32px; display: grid; gap: 32px; }

  .section-label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
  }

  .search-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; }

  .autocomplete-wrap { position: relative; }

  .autocomplete-list {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
    overflow: hidden; z-index: 50; max-height: 240px; overflow-y: auto; display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .autocomplete-list.open { display: block; }

  .autocomplete-item {
    padding: 10px 14px; cursor: pointer; font-size: 14px;
    transition: background 0.1s; display: flex; flex-direction: column; gap: 2px;
  }
  .autocomplete-item:hover, .autocomplete-item.active { background: var(--border); }
  .autocomplete-item .item-name { color: var(--text); }
  .autocomplete-item .item-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.05em; }

  /* FILTERS */
  .filters-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .filter-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }

  .filter-title {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }

  .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
  .checkbox-item { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .checkbox-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--text); cursor: pointer; }
  .checkbox-label { font-size: 13px; color: var(--dim); display: flex; align-items: center; gap: 6px; }
  .mode-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }

  .time-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .time-input-wrap { display: flex; flex-direction: column; gap: 4px; }
  .time-sublabel { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; }

  label {
    font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
  }

  input[type="text"] {
    background: var(--bg); border: 1px solid var(--border2); border-radius: 6px;
    padding: 10px 14px; font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text); outline: none; transition: border-color 0.15s; width: 100%;
  }
  input:focus { border-color: #555; }
  input::placeholder { color: var(--muted2); }

  input[type="time"], input[type="date"] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    padding: 7px 10px; font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text); outline: none; transition: border-color 0.15s; width: 100%; color-scheme: dark;
  }
  input[type="time"]:focus, input[type="date"]:focus { border-color: #555; }

  /* DATE FILTER CARD — spans full width */
  .date-filter-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .date-filter-card .filter-title { margin-bottom: 0; white-space: nowrap; }
  .date-shortcuts { display: flex; gap: 6px; flex-wrap: wrap; }
  .date-chip {
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px;
    border-radius: 4px; border: 1px solid var(--border2); background: transparent;
    color: var(--dim); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .date-chip:hover { border-color: #555; color: var(--text); }
  .date-chip.active { border-color: var(--text); color: var(--text); background: var(--surface2); }

  /* BUTTONS */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 20px; border-radius: 6px; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    border: none; letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--text); color: var(--bg); width: 100%; }
  .btn-primary:hover { background: #d0d0d0; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { border-color: #555; color: var(--dim); }

  /* SPIN */
  .spin-section { display: flex; justify-content: center; padding: 8px 0; }
  .spin-btn {
    background: var(--text); color: var(--bg); border: none; padding: 14px 48px;
    border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: 0.02em; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 10px;
  }
  .spin-btn:hover { background: #e0e0e0; transform: translateY(-1px); }
  .spin-btn:active { transform: translateY(0); }
  .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .spin-icon { font-size: 18px; transition: transform 0.6s; }
  .spin-btn.spinning .spin-icon { animation: spin 0.6s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* DEPARTURES */
  .departures-wrap { opacity: 0; transform: translateY(8px); transition: opacity 0.3s, transform 0.3s; }
  .departures-wrap.visible { opacity: 1; transform: none; }
  .departures-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .count-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
  .departures-list { display: flex; flex-direction: column; gap: 4px; }

  .dep-row {
    display: grid; grid-template-columns: 72px 1fr auto auto;
    gap: 16px; align-items: center; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer; transition: all 0.15s; position: relative;
  }
  .dep-row:hover { border-color: var(--border2); background: var(--surface2); }
  .dep-row.selected { border-color: var(--text); background: var(--surface2); }
  .dep-row.selected::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--text); border-radius: 8px 0 0 8px;
  }

  .dep-time { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--text); letter-spacing: -0.02em; }
  .dep-info { overflow: hidden; }
  .dep-dest { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
  .dep-line { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .dep-mode { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; border: 1px solid; }
  .dep-delay { font-family: 'DM Mono', monospace; font-size: 11px; text-align: right; }

  .mode-tgv { color: #f87171; border-color: #f8717140; }
  .mode-ter { color: #60a5fa; border-color: #60a5fa40; }
  .mode-intercites { color: #fbbf24; border-color: #fbbf2440; }
  .mode-transilien { color: #a78bfa; border-color: #a78bfa40; }
  .mode-bus { color: #34d399; border-color: #34d39940; }
  .mode-other { color: var(--muted); border-color: var(--border2); }

  /* WINNER */
  .winner-section { opacity: 0; transform: translateY(12px); transition: opacity 0.4s, transform 0.4s; }
  .winner-section.visible { opacity: 1; transform: none; }
  .winner-card { background: var(--surface2); border: 1px solid #3a3a3a; border-radius: 12px; padding: 28px 32px; position: relative; overflow: hidden; }
  .winner-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, #555, transparent); }
  .winner-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .winner-eyebrow::before { content: ''; width: 20px; height: 1px; background: var(--muted2); }
  .winner-main { display: flex; align-items: baseline; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
  .winner-time { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 500; color: var(--text); letter-spacing: -0.04em; line-height: 1; }
  .winner-dest { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; line-height: 1.1; }
  .winner-meta { display: flex; gap: 24px; flex-wrap: wrap; }
  .winner-meta-item { display: flex; flex-direction: column; gap: 3px; }
  .wmeta-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .wmeta-val { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--dim); }
  .winner-actions { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }

  /* STATES */
  .state-box { padding: 48px 32px; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; border-style: dashed; }
  .state-icon { font-size: 32px; margin-bottom: 16px; }
  .state-title { font-size: 16px; font-weight: 600; color: var(--dim); margin-bottom: 6px; }
  .state-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .err-box { background: #1a0e0e; border: 1px solid #3a1515; border-radius: 8px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--red); line-height: 1.5; display: none; }
  .err-box.visible { display: block; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* LOADING */
  .loading-row { display: flex; align-items: center; gap: 10px; padding: 16px; color: var(--muted); font-size: 13px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

  /* RANGE */
  .count-row { display: flex; align-items: center; gap: 10px; }
  input[type="range"] { accent-color: var(--text); flex: 1; cursor: pointer; }
  .range-val { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--dim); min-width: 28px; }

  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

  @media (max-width: 640px) {
    main { padding: 24px 16px; }
    header { padding: 16px 20px; }
    .filters-grid { grid-template-columns: 1fr; }
    .winner-time { font-size: 36px; }
    .winner-dest { font-size: 20px; }
    .dep-row { grid-template-columns: 56px 1fr auto; }
    .dep-delay { display: none; }
    .date-filter-card { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-main">Roulette Train</span>
    <span class="logo-tag">SNCF</span>
  </div>
  <div class="api-status">
    <span class="status-dot ok" id="statusDot"></span>
    <span id="statusText">Vercel OK</span>
  </div>
</header>

<main>

  <div class="err-box" id="errBox"></div>

  <!-- GARE DE DÉPART -->
  <div>
    <div class="section-label">Gare de départ</div>
    <div class="search-row">
      <div class="autocomplete-wrap">
        <div class="field" style="margin:0">
          <input type="text" id="stationInput" placeholder="Toulouse, Paris, Lyon…" autocomplete="off" />
        </div>
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>
      <button class="btn btn-ghost" id="searchBtn" onclick="loadDepartures()">Chercher</button>
    </div>
  </div>

  <!-- FILTRES -->
  <div>
    <div class="section-label">Filtres</div>

    <!-- FILTRE DATE (ligne entière) -->
    <div class="date-filter-card" style="margin-bottom:12px">
      <div class="filter-title">Jour</div>
      <div class="date-shortcuts">
        <button class="date-chip active" id="chip-today" onclick="setDateChip('today')">Aujourd'hui</button>
        <button class="date-chip" id="chip-tomorrow" onclick="setDateChip('tomorrow')">Demain</button>
        <button class="date-chip" id="chip-d2" onclick="setDateChip('d2')">Dans 2 jours</button>
        <button class="date-chip" id="chip-d3" onclick="setDateChip('d3')">Dans 3 jours</button>
        <button class="date-chip" id="chip-d4" onclick="setDateChip('d4')">Dans 4 jours</button>
        <button class="date-chip" id="chip-d5" onclick="setDateChip('d5')">Dans 5 jours</button>
        <button class="date-chip" id="chip-d6" onclick="setDateChip('d6')">Dans 6 jours</button>
      </div>
      <input type="date" id="datePicker" style="max-width:160px;flex-shrink:0" oninput="onDatePickerChange()" />
    </div>

    <div class="filters-grid">
      <div class="filter-card">
        <div class="filter-title">Modes de transport</div>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" name="mode" value="LongDistanceTrain" checked><span class="checkbox-label"><span class="mode-dot" style="background:#f87171"></span>TGV / Grandes lignes</span></label>
          <label class="checkbox-item"><input type="checkbox" name="mode" value="LocalTrain" checked><span class="checkbox-label"><span class="mode-dot" style="background:#60a5fa"></span>TER / Local</span></label>
          <label class="checkbox-item"><input type="checkbox" name="mode" value="Train" checked><span class="checkbox-label"><span class="mode-dot" style="background:#fbbf24"></span>Intercités</span></label>
          <label class="checkbox-item"><input type="checkbox" name="mode" value="RapidTransit" checked><span class="checkbox-label"><span class="mode-dot" style="background:#a78bfa"></span>RER / Transilien</span></label>
          <label class="checkbox-item"><input type="checkbox" name="mode" value="Bus" checked><span class="checkbox-label"><span class="mode-dot" style="background:#34d399"></span>Bus</span></label>
        </div>
      </div>

      <div class="filter-card">
        <div class="filter-title">Plage horaire</div>
        <div class="time-inputs">
          <div class="time-input-wrap">
            <span class="time-sublabel">Dès</span>
            <input type="time" id="timeFrom" value="00:00">
          </div>
          <div class="time-input-wrap">
            <span class="time-sublabel">Avant</span>
            <input type="time" id="timeTo" value="23:59">
          </div>
        </div>
      </div>

      <div class="filter-card">
        <div class="filter-title">Nombre de départs</div>
        <div class="count-row">
          <input type="range" id="countRange" min="10" max="250" value="50" step="10">
          <span class="range-val" id="countVal">50</span>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5;">
          Récupère les N prochains départs avant d'appliquer les filtres.
        </div>
      </div>
    </div>
  </div>

  <!-- LISTE DES DÉPARTS -->
  <div class="departures-wrap" id="departuresWrap">
    <div class="departures-header">
      <div class="section-label" style="margin:0">Départs trouvés</div>
      <div class="count-badge" id="countBadge">0 résultats</div>
    </div>
    <div class="departures-list" id="departuresList"></div>
  </div>

  <!-- SPIN -->
  <div class="spin-section" id="spinSection" style="display:none">
    <button class="spin-btn" id="spinBtn" onclick="pickRandom()">
      <span class="spin-icon">🎲</span>
      Choisir un départ au hasard
    </button>
  </div>

  <!-- WINNER -->
  <div class="winner-section" id="winnerSection">
    <div class="winner-eyebrow">Tirage au sort</div>
    <div class="winner-card" id="winnerCard"></div>
  </div>

</main>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────

const API_PREFIX = '/api/sncf';

let selectedStation = null;
let allDepartures = [];
let filteredDepartures = [];
let autocompleteTimer = null;

// ── STATUS ───────────────────────────────────────────────────────────────────

function updateStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ok';
  txt.textContent = 'Vercel OK';
}

// ── DATE HELPERS ────────────────────────────────────────────────────────────

function getLocalDateStr(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// Chip offsets
const chipOffsets = { today: 0, tomorrow: 1, d2: 2, d3: 3, d4: 4, d5: 5, d6: 6 };
let activeChip = 'today';

function setDateChip(key) {
  activeChip = key;
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + key).classList.add('active');
  document.getElementById('datePicker').value = getLocalDateStr(chipOffsets[key]);
  // Re-chercher si une station est déjà choisie
  if (selectedStation) loadDepartures();
}

function onDatePickerChange() {
  // Désactiver les chips si l'utilisateur choisit une date custom
  const val = document.getElementById('datePicker').value;
  const matchOffset = Object.entries(chipOffsets).find(([k, o]) => getLocalDateStr(o) === val);
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  if (matchOffset) {
    activeChip = matchOffset[0];
    document.getElementById('chip-' + activeChip).classList.add('active');
  } else {
    activeChip = null;
  }
  if (selectedStation) loadDepartures();
}

// Init date picker à aujourd'hui
document.getElementById('datePicker').value = getLocalDateStr(0);

// ── BUILD DATETIME FOR API ──────────────────────────────────────────────────

function buildFromDatetime() {
  const dateVal = document.getElementById('datePicker').value; // YYYY-MM-DD
  const timeFrom = document.getElementById('timeFrom').value || '00:00'; // HH:MM
  if (!dateVal) return null;

  const [y, m, d] = dateVal.split('-');
  const [hh, mm] = timeFrom.split(':');

  // Si c'est aujourd'hui et l'heure choisie est dans le passé, utiliser l'heure actuelle
  const now = new Date();
  const todayStr = getLocalDateStr(0);
  if (dateVal === todayStr) {
    const chosenMinutes = parseInt(hh)*60 + parseInt(mm);
    const nowMinutes    = now.getHours()*60 + now.getMinutes();
    if (chosenMinutes < nowMinutes) {
      // prendre l'heure actuelle
      const nh = String(now.getHours()).padStart(2,'0');
      const nm = String(now.getMinutes()).padStart(2,'0');
      return `${y}${m}${d}T${nh}${nm}00`;
    }
  }
  return `${y}${m}${d}T${hh}${mm.padStart(2,'0')}00`;
}

// ── API ─────────────────────────────────────────────────────────────────────

function buildUrl(path) {
  return `${API_PREFIX}${path}`;
}

async function sncfFetch(path) {
  const url = buildUrl(path);
  const res = await fetch(url);
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`Erreur API ${res.status}: ${text.substring(0, 300)}`);
  }
  return res.json();
}

// ── AUTOCOMPLETE ────────────────────────────────────────────────────────────

const stationInput     = document.getElementById('stationInput');
const autocompleteList = document.getElementById('autocompleteList');

stationInput.addEventListener('input', () => {
  clearTimeout(autocompleteTimer);
  const q = stationInput.value.trim();
  if (q.length < 2) { autocompleteList.classList.remove('open'); return; }
  autocompleteTimer = setTimeout(() => fetchSuggestions(q), 300);
});

stationInput.addEventListener('keydown', (e) => {
  const items  = autocompleteList.querySelectorAll('.autocomplete-item');
  const active = autocompleteList.querySelector('.autocomplete-item.active');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!active) items[0]?.classList.add('active');
    else { active.classList.remove('active'); active.nextElementSibling?.classList.add('active'); }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (active) { active.classList.remove('active'); active.previousElementSibling?.classList.add('active'); }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const sel = autocompleteList.querySelector('.autocomplete-item.active') || autocompleteList.querySelector('.autocomplete-item');
    if (sel) sel.click(); else loadDepartures();
  } else if (e.key === 'Escape') {
    autocompleteList.classList.remove('open');
  }
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.autocomplete-wrap')) autocompleteList.classList.remove('open');
});

async function fetchSuggestions(q) {
  try {
    const data = await sncfFetch(`/places?q=${encodeURIComponent(q)}&type[]=stop_area&count=8`);
    const places = data.places || [];
    autocompleteList.innerHTML = '';
    if (!places.length) { autocompleteList.classList.remove('open'); return; }
    places.forEach(p => {
      const el = document.createElement('div');
      el.className = 'autocomplete-item';
      const adminLabel = p.administrative_regions?.[0]?.name || '';
      el.innerHTML = `<span class="item-name">${p.name}</span><span class="item-sub">${p.id} ${adminLabel ? '· ' + adminLabel : ''}</span>`;
      el.addEventListener('click', () => {
        selectedStation = { id: p.id, name: p.name };
        stationInput.value = p.name;
        autocompleteList.classList.remove('open');
      });
      autocompleteList.appendChild(el);
    });
    autocompleteList.classList.add('open');
  } catch(e) {
    showError(e.message);
  }
}

// ── DEPARTURES ──────────────────────────────────────────────────────────────

async function loadDepartures() {
  if (!selectedStation) {
    const q = stationInput.value.trim();
    if (!q) return showError('Saisis une gare d\'abord.');
    try {
      const data = await sncfFetch(`/places?q=${encodeURIComponent(q)}&type[]=stop_area&count=1`);
      if (!data.places?.length) return showError('Gare non trouvée.');
      selectedStation = { id: data.places[0].id, name: data.places[0].name };
      stationInput.value = selectedStation.name;
    } catch(e) { return showError(e.message); }
  }

  clearError();
  setLoading(true);

  try {
    const count = document.getElementById('countRange').value;
    const dt    = buildFromDatetime();
    if (!dt) return showError('Sélectionne une date.');

    // On utilise l'endpoint departures sur le stop_area, avec from_datetime au jour choisi
    // depth=3 pour avoir les physical_modes et commercial_modes correctement
    const data = await sncfFetch(
      `/stop_areas/${selectedStation.id}/departures?from_datetime=${dt}&count=${count}&depth=3&data_freshness=realtime`
    );

    allDepartures = (data.departures || []).map(parseDeparture);

    // Filtrer uniquement les départs du jour sélectionné
    const dateVal = document.getElementById('datePicker').value; // YYYY-MM-DD
    const dayStr  = dateVal.replace(/-/g, ''); // YYYYMMDD
    allDepartures = allDepartures.filter(dep => {
      const rawBase = dep.raw?.stop_date_time?.base_departure_date_time || '';
      return rawBase.startsWith(dayStr);
    });

    applyFilters();
    renderDepartures();
  } catch(e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

function parseDeparture(d) {
  const base = d.stop_date_time?.base_departure_date_time || '';
  const rt   = d.stop_date_time?.departure_date_time || base;
  const parseTime = s => s ? `${s.slice(9,11)}:${s.slice(11,13)}` : '??:??';

  const baseTime = parseTime(base);
  const rtTime   = parseTime(rt);
  const delayed  = base && rt && rt !== base;

  const route    = d.route || {};
  const line     = route.line || {};
  const physMode = line.physical_modes?.[0]?.name || '';
  const commMode = line.commercial_mode?.name || physMode;

  return {
    baseTime,
    rtTime,
    delayed,
    dest: route.direction?.stop_area?.name || route.direction?.name || 'Destination inconnue',
    lineName: line.name || '',
    lineCode: line.code || '',
    physMode,
    commMode,
    raw: d,
  };
}

function applyFilters() {
  const selectedModes = [...document.querySelectorAll('input[name="mode"]:checked')].map(i => i.value);
  const timeFrom = document.getElementById('timeFrom').value || '00:00';
  const timeTo   = document.getElementById('timeTo').value   || '23:59';

  filteredDepartures = allDepartures.filter(dep => {
    if (dep.baseTime < timeFrom || dep.baseTime > timeTo) return false;
    const modeMatch = selectedModes.some(m => {
      if (m === 'Bus')             return dep.commMode.toLowerCase().includes('bus') || dep.physMode.toLowerCase().includes('bus');
      if (m === 'LongDistanceTrain') return dep.commMode.toLowerCase().includes('tgv') || dep.commMode.toLowerCase().includes('inoui') || dep.commMode.toLowerCase().includes('ouigo') || dep.physMode === 'LongDistanceTrain';
      if (m === 'LocalTrain')      return dep.commMode.toLowerCase().includes('ter') || dep.physMode === 'LocalTrain';
      if (m === 'Train')           return dep.commMode.toLowerCase().includes('intercit') || dep.physMode === 'Train';
      if (m === 'RapidTransit')    return dep.commMode.toLowerCase().includes('rer') || dep.commMode.toLowerCase().includes('transiliens') || dep.physMode === 'RapidTransit';
      return false;
    });
    return modeMatch || selectedModes.length === 5;
  });
}

function getModeClass(dep) {
  const c = dep.commMode.toLowerCase();
  const p = dep.physMode.toLowerCase();
  if (c.includes('tgv') || c.includes('inoui') || c.includes('ouigo')) return 'mode-tgv';
  if (c.includes('ter') || p === 'localtrain') return 'mode-ter';
  if (c.includes('intercit')) return 'mode-intercites';
  if (c.includes('rer') || c.includes('transilien')) return 'mode-transilien';
  if (c.includes('bus') || p.includes('bus')) return 'mode-bus';
  return 'mode-other';
}

function getModeLabel(dep) {
  const c = dep.commMode.toLowerCase();
  if (c.includes('tgv') || c.includes('inoui')) return 'TGV';
  if (c.includes('ouigo')) return 'Ouigo';
  if (c.includes('ter')) return 'TER';
  if (c.includes('intercit')) return 'IC';
  if (c.includes('rer')) return 'RER';
  if (c.includes('transilien')) return 'Tilien';
  if (c.includes('bus')) return 'Bus';
  return dep.commMode || dep.physMode || '?';
}

function renderDepartures() {
  const wrap       = document.getElementById('departuresWrap');
  const list       = document.getElementById('departuresList');
  const badge      = document.getElementById('countBadge');
  const spinSection = document.getElementById('spinSection');

  // Afficher le jour choisi dans le badge
  const dateVal = document.getElementById('datePicker').value;
  const dateLabel = dateVal ? new Date(dateVal + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }) : '';

  badge.textContent = `${filteredDepartures.length} résultat${filteredDepartures.length !== 1 ? 's' : ''} ${dateLabel ? '· ' + dateLabel : ''}`;

  if (!filteredDepartures.length) {
    list.innerHTML = `<div class="state-box"><div class="state-icon">🚉</div><div class="state-title">Aucun départ trouvé</div><div class="state-sub">Essaie d'élargir les filtres ou de changer la plage horaire / le jour.</div></div>`;
    spinSection.style.display = 'none';
  } else {
    list.innerHTML = filteredDepartures.map((dep, i) => {
      const modeClass = getModeClass(dep);
      const modeLabel = getModeLabel(dep);
      const delayHtml = dep.delayed
        ? `<div class="dep-delay" style="color:var(--red)">+retard<br><span style="text-decoration:line-through;color:var(--muted)">${dep.baseTime}</span></div>`
        : `<div class="dep-delay" style="color:var(--green)">·</div>`;
      return `<div class="dep-row" data-idx="${i}" onclick="highlightRow(${i})">
        <div class="dep-time">${dep.rtTime}</div>
        <div class="dep-info">
          <div class="dep-dest">${dep.dest}</div>
          <div class="dep-line">${dep.lineName}${dep.lineCode ? ' · ' + dep.lineCode : ''}</div>
        </div>
        <div class="dep-mode ${modeClass}">${modeLabel}</div>
        ${delayHtml}
      </div>`;
    }).join('');
    spinSection.style.display = 'flex';
  }

  wrap.classList.add('visible');
  document.getElementById('winnerSection').classList.remove('visible');
}

function highlightRow(i) {
  document.querySelectorAll('.dep-row').forEach(r => r.classList.remove('selected'));
  document.querySelector(`.dep-row[data-idx="${i}"]`)?.classList.add('selected');
  showWinner(filteredDepartures[i]);
}

// ── RANDOM PICK ─────────────────────────────────────────────────────────────

function pickRandom() {
  if (!filteredDepartures.length) return;
  const btn = document.getElementById('spinBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  let flashes = 0;
  const maxFlashes = 12;
  const interval = setInterval(() => {
    const randIdx = Math.floor(Math.random() * filteredDepartures.length);
    highlightRow(randIdx);
    flashes++;
    if (flashes >= maxFlashes) {
      clearInterval(interval);
      const finalIdx = Math.floor(Math.random() * filteredDepartures.length);
      highlightRow(finalIdx);
      showWinner(filteredDepartures[finalIdx]);
      btn.classList.remove('spinning');
      btn.disabled = false;
      document.getElementById('winnerSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 80);
}

function showWinner(dep) {
  const modeClass = getModeClass(dep);
  const modeLabel = getModeLabel(dep);
  const dateVal   = document.getElementById('datePicker').value;
  const dateLabel = dateVal ? new Date(dateVal + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }) : '';

  document.getElementById('winnerCard').innerHTML = `
    <div class="winner-main">
      <div class="winner-time">${dep.rtTime}</div>
      <div class="winner-dest">${dep.dest}</div>
    </div>
    <div class="winner-meta">
      <div class="winner-meta-item">
        <span class="wmeta-label">Date</span>
        <span class="wmeta-val">${dateLabel}</span>
      </div>
      <div class="winner-meta-item">
        <span class="wmeta-label">Ligne</span>
        <span class="wmeta-val">${dep.lineName || '—'}</span>
      </div>
      <div class="winner-meta-item">
        <span class="wmeta-label">Mode</span>
        <span class="wmeta-val dep-mode ${modeClass}" style="border:none;padding:0;font-size:13px">${modeLabel}</span>
      </div>
      ${dep.delayed
        ? `<div class="winner-meta-item"><span class="wmeta-label">Statut</span><span class="wmeta-val" style="color:var(--red)">Retardé (prévu ${dep.baseTime})</span></div>`
        : `<div class="winner-meta-item"><span class="wmeta-label">Statut</span><span class="wmeta-val" style="color:var(--green)">À l'heure</span></div>`
      }
    </div>
    <div class="winner-actions">
      <button class="btn btn-ghost" onclick="pickRandom()">🎲 Retirer</button>
      <button class="btn btn-ghost" onclick="copyWinner(event)" style="margin-left:auto">Copier</button>
    </div>
  `;
  document.getElementById('winnerSection').classList.add('visible');
}

function copyWinner(e) {
  const card = document.getElementById('winnerCard');
  const time = card.querySelector('.winner-time').textContent;
  const dest = card.querySelector('.winner-dest').textContent;
  const dateVal = document.getElementById('datePicker').value;
  const dateLabel = dateVal ? new Date(dateVal + 'T12:00:00').toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' }) : '';
  navigator.clipboard.writeText(`${dateLabel} ${time} → ${dest}`).then(() => {
    e.target.textContent = 'Copié ✓';
    setTimeout(() => e.target.textContent = 'Copier', 2000);
  });
}

// ── UTILS ────────────────────────────────────────────────────────────────────

function showError(msg) {
  const box = document.getElementById('errBox');
  box.textContent = '⚠ ' + msg;
  box.classList.add('visible');
  setLoading(false);
}

function clearError() {
  document.getElementById('errBox').classList.remove('visible');
}

function setLoading(on) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = on;
  btn.textContent = on ? 'Chargement…' : 'Chercher';
}

// ── EVENTS ────────────────────────────────────────────────────────────────────

document.getElementById('countRange').addEventListener('input', function() {
  document.getElementById('countVal').textContent = this.value;
});

document.querySelectorAll('input[name="mode"], #timeFrom, #timeTo').forEach(el => {
  el.addEventListener('change', () => {
    if (allDepartures.length) { applyFilters(); renderDepartures(); }
  });
});
</script>
</body>
